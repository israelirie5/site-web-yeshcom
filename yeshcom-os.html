// ─── MINI CHART COMPONENTS ──────────────────────────────────────────────
const SparkLine = ({ data, color = "#FF6600", width = 80, height = 32 }) => {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

const BarChart = ({ data, colors }) => {
  const max = Math.max(...data.map(d => d.value));
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 80, padding: '8px 0' }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <div style={{ width: '100%', background: colors ? colors[i % colors.length] : 'var(--accent)', borderRadius: '3px 3px 0 0', height: `${(d.value / max) * 64}px`, transition: 'height 0.5s ease', opacity: 0.85 }}></div>
          <span style={{ fontSize: 9, color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
};

const DonutChart = ({ value, size = 72, color = "#FF6600" }) => {
  const r = 28, circ = 2 * Math.PI * r;
  const dash = (value / 100) * circ;
  return (
    <svg width={size} height={size} viewBox="0 0 64 64">
      <circle cx="32" cy="32" r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="8"/>
      <circle cx="32" cy="32" r={r} fill="none" stroke={color} strokeWidth="8"
        strokeDasharray={`${dash} ${circ - dash}`} strokeLinecap="round"
        transform="rotate(-90 32 32)" style={{ transition: 'stroke-dasharray 0.8s ease' }}/>
      <text x="32" y="37" textAnchor="middle" fontSize="13" fontWeight="700" fill="var(--text-primary)" fontFamily="DM Sans">{value}%</text>
    </svg>
  );
};

      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16 }}>
        <div style={{ background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 12, padding: '20px 22px' }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-primary)', fontFamily: 'DM Sans', marginBottom: 4 }}>Évolution du chiffre d'affaires</div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 16 }}>Jan — Sep 2026 • en milliers DZD</div>
          <BarChart data={monthlyData} colors={monthlyData.map((_, i) => i === 8 ? accentColor : `${accentColor}55`)}/>
        </div>
        <div style={{ background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 12, padding: '20px 22px' }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-primary)', fontFamily: 'DM Sans', marginBottom: 16 }}>Répartition par département</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {[
              { name: 'Développement', pct: 42, color: '#3b82f6' },
              { name: 'Infrastructure', pct: 28, color: accentColor },
              { name: 'Design', pct: 18, color: '#ec4899' },
              { name: 'Conseil', pct: 12, color: '#22c55e' },
            ].map((d, i) => (
              <div key={i}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{d.name}</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: d.color }}>{d.pct}%</span>
                </div>
                <div style={{ height: 6, background: 'rgba(255,255,255,0.07)', borderRadius: 3 }}>
                  <div style={{ height: '100%', width: `${d.pct}%`, background: d.color, borderRadius: 3 }}></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── GENERIC PLACEHOLDER ──────────────────────────────────────────────────
const PlaceholderModule = ({ title, accentColor }) => (
  <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
    <div style={{ width: 64, height: 64, borderRadius: 16, background: `${accentColor}18`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <Icon name="chart" size={28} color={accentColor}/>
    </div>
    <div style={{ fontSize: 18, fontWeight: 700, fontFamily: 'DM Sans', color: 'var(--text-primary)' }}>{title}</div>
    <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>Module en cours de développement</div>
  </div>
);

// ─── MODULE TITLES ────────────────────────────────────────────────────────
const moduleTitles = {
  dashboard: 'Dashboard',
  projects: 'Gestion de projets',
  invoice: 'Facturation & Devis',
  crm: 'CRM & Ventes',
  hr: 'Ressources Humaines',
  accounting: 'Comptabilité & Finance',
  inventory: 'Inventaire & Stock',
  analytics: 'Analytics & Rapports',
  messages: 'Messagerie interne',
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────
const App = () => {
  const [loggedIn, setLoggedIn] = useState(false);
  const [activeModule, setActiveModule] = useState('dashboard');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = tweaks.accentColor;
  const isLight = tweaks.theme === 'light';

  useEffect(() => {
    document.documentElement.className = isLight ? 'light-theme' : '';
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-light', accent + 'cc');
    document.documentElement.style.setProperty('--accent-dim', accent + '22');
  }, [accent, isLight]);

  const renderModule = () => {
    switch(activeModule) {
      case 'dashboard': return <DashboardModule accentColor={accent}/>;
      case 'projects': return <ProjectsModule accentColor={accent}/>;
      case 'invoice': return <InvoiceModule accentColor={accent}/>;
      case 'crm': return <CRMModule accentColor={accent}/>;
      case 'hr': return <HRModule accentColor={accent}/>;
      case 'messages': return <MessagesModule accentColor={accent}/>;
      case 'analytics': return <AnalyticsModule accentColor={accent}/>;
      default: return <PlaceholderModule title={moduleTitles[activeModule]} accentColor={accent}/>;
    }
  };

  if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)}/>;

  return (
    <>
      <div style={{ width: '100vw', height: '100vh', display: 'flex', overflow: 'hidden' }}>
        <Sidebar active={activeModule} onNavigate={setActiveModule} collapsed={sidebarCollapsed} accentColor={accent}/>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <Topbar title={moduleTitles[activeModule]} onToggle={() => setSidebarCollapsed(!sidebarCollapsed)} accentColor={accent} onLogout={() => setLoggedIn(false)}/>
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
            {renderModule()}
          </div>
        </div>
      </div>
      <TweaksPanel>
        <TweakSection title="Apparence">
          <TweakColor label="Couleur principale" value={accent} onChange={v => setTweak('accentColor', v)}/>
          <TweakRadio label="Thème" value={tweaks.theme} options={[{label:'Sombre',value:'dark'},{label:'Clair',value:'light'}]} onChange={v => setTweak('theme', v)}/>
        </TweakSection>
        <TweakSection title="Navigation">
          <TweakRadio label="Sidebar" value={sidebarCollapsed ? 'collapsed' : 'expanded'} options={[{label:'Étendue',value:'expanded'},{label:'Icônes',value:'collapsed'}]} onChange={v => setSidebarCollapsed(v === 'collapsed')}/>
          <TweakRadio label="Module actif" value={activeModule} options={navItems.slice(0,4).map(n => ({label:n.label.split(' ')[0], value: n.id}))} onChange={v => setActiveModule(v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
