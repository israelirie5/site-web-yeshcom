// ── BADGE ────────────────────────────────────────────────────────────────
const Badge = ({ label, color = C.t2, small = false }) => (
  <span style={{ display:'inline-flex', alignItems:'center', gap:4, background:`${color}18`, color, borderRadius:4, padding: small ? '2px 6px' : '3px 8px', fontSize: small ? 9 : 10, fontWeight:700, letterSpacing:'0.05em', textTransform:'uppercase', whiteSpace:'nowrap', fontFamily:'JetBrains Mono, monospace' }}>
    {label}
  </span>
);

// ── STAT CARD ────────────────────────────────────────────────────────────
const StatCard = ({ label, value, sub, delta, trend, color=C.primary, icon }) => (
  <div className="fade-up" style={{ background:C.s1, border:`1px solid ${C.border}`, borderRadius:8, padding:'18px 20px', display:'flex', flexDirection:'column', gap:10, transition:'transform 0.15s', cursor:'default' }}
    onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
    onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
      <span style={{ fontSize:11, color:C.t3, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em' }}>{label}</span>
      {icon && <div style={{ width:30, height:30, borderRadius:7, background:`${color}18`, display:'flex', alignItems:'center', justifyContent:'center' }}><I n={icon} s={15} c={color}/></div>}
    </div>
    <div style={{ fontSize:28, fontWeight:700, fontFamily:'Montserrat', color:C.t1, letterSpacing:'0.02em', lineHeight:1 }}>{value}</div>
    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
      {delta && <span style={{ fontSize:11, fontWeight:600, color: trend==='up'?C.success:C.danger, display:'flex', alignItems:'center', gap:2 }}>
        <I n={trend==='up'?'up':'down'} s={10} c={trend==='up'?C.success:C.danger}/>{delta}
      </span>}
      {sub && <span style={{ fontSize:11, color:C.t3 }}>{sub}</span>}
    </div>
  </div>
);

// ── MINI BAR CHART ───────────────────────────────────────────────────────
const MiniBar = ({ data, color=C.primary, h=60 }) => {
  const max = Math.max(...data.map(d=>d.v));
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:4, height:h }}>
      {data.map((d,i) => (
        <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
          <div style={{ width:'100%', background:`${color}${i===data.length-1?'ff':'55'}`, borderRadius:'2px 2px 0 0', height:`${(d.v/max)*(h-14)}px`, minHeight:3 }}></div>
          <span style={{ fontSize:9, color:C.t3, fontFamily:'JetBrains Mono', whiteSpace:'nowrap' }}>{d.l}</span>
        </div>
      ))}
    </div>
  );
};

// ── PROGRESS BAR ─────────────────────────────────────────────────────────
const ProgressBar = ({ value, color=C.primary, h=4 }) => (
  <div style={{ height:h, background:`${C.border}`, borderRadius:h/2, overflow:'hidden' }}>
    <div style={{ height:'100%', width:`${value}%`, background:color, borderRadius:h/2, transition:'width 0.8s ease' }}></div>
  </div>
);

// ── DONUT ────────────────────────────────────────────────────────────────
const Donut = ({ value, size=56, color=C.primary, label }) => {
  const r=22, circ=2*Math.PI*r, dash=(value/100)*circ;
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
      <svg width={size} height={size} viewBox="0 0 56 56">
        <circle cx="28" cy="28" r={r} fill="none" stroke={C.border} strokeWidth="6"/>
        <circle cx="28" cy="28" r={r} fill="none" stroke={color} strokeWidth="6"
          strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round" transform="rotate(-90 28 28)"/>
        <text x="28" y="33" textAnchor="middle" fontSize="11" fontWeight="700" fill={C.t1} fontFamily="Montserrat">{value}%</text>
      </svg>
      {label && <span style={{ fontSize:10, color:C.t2, textAlign:'center' }}>{label}</span>}
    </div>
  );
};

  staff: { label:'Staff', icon:'🎨', color:C.purple },

// ── SIDEBAR ──────────────────────────────────────────────────────────────
const Sidebar = ({ active, onNav, role, collapsed, accent, onLogout }) => {
  const nav = NAV_BY_ROLE[role] || NAV_BY_ROLE.super_admin;
  const rl = ROLE_LABELS[role];
  return (

      <nav style={{ flex:1, padding:'8px 6px', overflowY:'auto', display:'flex', flexDirection:'column', gap:1 }}>
        {nav.map((item, i) => {
          if (item.divider) return <div key={i} style={{ height:1, background:C.border, margin:'6px 0' }}></div>;
          const isActive = active === item.id;
          return (
            <button key={item.id} onClick={() => onNav(item.id)}

              style={{ display:'flex', alignItems:'center', gap:9, padding:collapsed?'9px 0':'9px 10px', borderRadius:6, border:'none', background:isActive?`${accent}18`:'transparent', color:isActive?accent:C.t2, cursor:'pointer', textAlign:'left', width:'100%', justifyContent:collapsed?'center':'flex-start', position:'relative', transition:'all 0.12s' }}
              onMouseEnter={e=>{ if(!isActive) e.currentTarget.style.background=C.s2; e.currentTarget.style.color=C.t1; }}

// ── APP ───────────────────────────────────────────────────────────────────
const App = () => {
  const [loggedIn, setLoggedIn] = useState(false);
  const [role, setRole] = useState('super_admin');
  const [active, setActive] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = tweaks.accentColor;

  useEffect(() => {
    document.documentElement.style.setProperty('--primary', accent);
    const h = e => { if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setShowSearch(s=>!s);} };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [accent]);

  const handleLogin = (r) => { setRole(r); setLoggedIn(true); setActive('dashboard'); };
  const handleLogout = () => setLoggedIn(false);

  const renderModule = () => {
    switch(active) {
      case 'dashboard': {
        if (role === 'super_admin' || role === 'admin') return <DashboardFounder accent={accent}/>;
        if (role === 'client') return <Placeholder title="Avancement projet" icon="chart" accent={accent}/>;
        return <Placeholder title="Mes missions" icon="projects" accent={accent}/>;
      }
      case 'finance': return <FinanceModule accent={accent}/>;
      case 'clients': return <ClientsModule accent={accent}/>;
      case 'projects': return <ProjectsModule accent={accent}/>;
      case 'team': return <TeamModule accent={accent}/>;
      case 'messages': return <MessagesModule accent={accent}/>;
      default: return <Placeholder title={MODULE_META[active]?.title || active} icon={MODULE_META[active]?.icon || 'dashboard'} accent={accent}/>;
    }
  };

  if (!loggedIn) return <LoginPage onLogin={handleLogin}/>;

  return (
    <>
      <div style={{ width:'100vw', height:'100vh', display:'flex', overflow:'hidden' }}>
        <Sidebar active={active} onNav={setActive} role={role} collapsed={collapsed} accent={accent} onLogout={handleLogout}/>
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', background:C.bg }}>
          <Topbar title={MODULE_META[active]?.title || active} onToggle={()=>setCollapsed(c=>!c)} accent={accent} onSearch={()=>setShowSearch(true)}/>
          <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
            {renderModule()}
          </div>
        </div>
      </div>
      {showSearch && <SearchModal onClose={()=>setShowSearch(false)} accent={accent} onNav={setActive}/>}
      <TweaksPanel>
        <TweakSection title="Apparence">
          <TweakColor label="Couleur accent" value={accent} onChange={v=>setTweak('accentColor',v)}/>
        </TweakSection>
        <TweakSection title="Démonstration">
          <TweakSelect label="Rôle actif" value={role} options={[
            {label:'👑 Super Admin (Israel/Mamadou)',value:'super_admin'},
            {label:'📋 Administrateur',value:'admin'},
            {label:'🎨 Staff',value:'staff'},
            {label:'⚡ Prestataire',value:'prestataire'},
            {label:'🏢 Client',value:'client'},
          ]} onChange={v=>setRole(v)}/>
          <TweakSelect label="Module" value={active} options={Object.entries(MODULE_META).map(([k,v])=>({label:v.title,value:k}))} onChange={v=>setActive(v)}/>
        </TweakSection>
        <TweakSection title="Sidebar">
          <TweakToggle label="Sidebar réduite" value={collapsed} onChange={v=>setCollapsed(v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
